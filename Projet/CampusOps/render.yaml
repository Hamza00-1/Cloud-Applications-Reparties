# ============================================
# CampusOps — Render Blueprint
# ============================================
# Deploys: API + managed Postgres + Redis.
# Frontend is deployed separately (Vercel/Netlify).
# Apply with:  https://render.com/docs/blueprint-spec
# ============================================

databases:
  - name: campusops-db
    plan: free
    databaseName: campusops
    user: campusops

services:
  # ---------- API ----------
  - type: web
    name: campusops-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_PREFIX
        value: /api
      - key: DATABASE_URL
        fromDatabase:
          name: campusops-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: campusops-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: CORS_ORIGIN
        sync: false       # set manually after frontend is deployed
      - key: APP_URL
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: IMAP_HOST
        sync: false
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENCLAW_WEBHOOK_SECRET
        generateValue: true
      - key: CRON_DAILY_PLANNING
        value: "on"
      - key: CRON_DAILY_PLANNING_TIME
        value: 0 7 * * *
      - key: CRON_TIMEZONE
        value: Africa/Casablanca

  # ---------- Redis ----------
  - type: redis
    name: campusops-redis
    plan: free
    ipAllowList: []        # private network only
    maxmemoryPolicy: allkeys-lru
