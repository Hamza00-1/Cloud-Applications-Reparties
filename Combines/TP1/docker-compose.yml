# TP1 — Docker Compose (TP 1.12 : Réseaux Docker)
# Description : Déploiement multi-conteneurs avec réseau et volume partagés

version: "3.9"

services:
  # --- Service principal : Application Flask ---
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tp1-webapp
    ports:
      - "5000:5000"
    environment:
      - APP_NAME=TP1-Docker-Compose
      - APP_VERSION=2.0
      - APP_ENV=production
      - PORT=5000
    volumes:
      - app-data:/app/data        # Volume nommé pour la persistance
    networks:
      - tp1-network               # Réseau dédié
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/sante')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Service secondaire : Serveur Nginx en reverse proxy ---
  nginx:
    image: nginx:alpine
    container_name: tp1-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tp1-network
    depends_on:
      webapp:
        condition: service_healthy
    restart: unless-stopped

# --- Volumes nommés (TP 1.11 — Persistance) ---
volumes:
  app-data:
    driver: local

# --- Réseaux (TP 1.12 — Réseaux Docker) ---
networks:
  tp1-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
